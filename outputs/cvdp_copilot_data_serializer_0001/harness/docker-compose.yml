services:
  direct:
    build: .
    volumes:
      - ./src/:/src/:ro # Infrastructure location
      - ./rtl:/code/rtl
      - ./rundir:/code/rundir
      - ./docs:/code/docs:ro
      - ./verif:/code/verif:ro
    working_dir : /code/rundir
    env_file    : ./src/.env
    command     : pytest -o cache_dir=/code/rundir/.cache /src/test_runner.py -v
