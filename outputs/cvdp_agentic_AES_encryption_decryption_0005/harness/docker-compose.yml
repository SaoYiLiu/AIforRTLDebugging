services:
  sanity:
    image: nvidia/cvdp-sim:v1.0.0
    volumes:
      - ./src:/src/      
      - ./rtl:/code/rtl
      - ./rundir:/code/rundir
      - ./docs:/code/docs:ro
      - ./verif:/code/verif:ro
    working_dir : /code/rundir
    env_file    : ./src/.env
    command     : pytest /src/test_runner.py -s -v -o cache_dir=/rundir/harness/.cache
